# Nginx config for the Replit frontend.
#
# Serves the Vite static bundle at `/` and reverse-proxies backend
# traffic to the `backend` service (docker-compose service name, or
# whatever BACKEND_URL is templated to at startup).
#
# In production the `backend` host is injected via envsubst so you can
# run this image against any backend host without rebuilding:
#   docker run -e BACKEND_URL=http://api.example.com -p 8080:80 replit-frontend
#
# Defaults to `backend:3001` which matches docker-compose.yml.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# `envsubst` will replace ${BACKEND_URL} at container start.
server {
    listen 80;
    server_name _;

    # Compress text payloads (Monaco source files, API JSON, etc).
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml application/xml+rss text/javascript image/svg+xml;

    # Static bundle — everything under / is served from /usr/share/nginx/html.
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any non-asset path falls back to index.html so React
    # Router (or any client-side routing) works on deep links.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Hashed assets emitted by Vite under /assets/ are safe to cache
    # forever. The HTML entry stays no-cache above so deploys roll out
    # cleanly.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # REST API → backend.
    location /api/ {
        proxy_pass         ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Socket.IO → backend. WebSocket upgrade headers + long-lived
    # timeouts are required so the terminal stream doesn't get cut at
    # the default 60s.
    location /socket.io/ {
        proxy_pass         ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
